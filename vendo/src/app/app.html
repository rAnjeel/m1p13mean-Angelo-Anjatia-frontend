<div *ngIf="showLayout(); else authOnly" class="page">
  <header class="header" role="banner">
    <div class="header-container">
      <div class="logo-section">
        <h1 class="logo">VENDEO</h1>
      </div>

      <nav class="nav-desktop" role="navigation" aria-label="Main navigation">
        <ul class="nav-list">
          <li *ngFor="let item of navigationItems" class="nav-item">
            <a
              [routerLink]="hasSubmenu(item) ? null : item.href"
              class="nav-link"
              [class.has-submenu]="hasSubmenu(item)"
              [attr.aria-expanded]="isDropdownOpen(item.label)"
              [attr.aria-haspopup]="hasSubmenu(item) ? 'true' : 'false'"
              (click)="hasSubmenu(item) && toggleDropdown(item.label); hasSubmenu(item) && $event.preventDefault()"
            >
              {{ item.label }}
              <span *ngIf="hasSubmenu(item)" class="dropdown-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
              </span>
            </a>

            <div
              *ngIf="hasSubmenu(item)"
              class="dropdown-menu"
              [class.active]="isDropdownOpen(item.label)"
              role="menu"
            >
              <a
                *ngFor="let subitem of item.submenu"
                [routerLink]="subitem.href"
                class="dropdown-item"
                role="menuitem"
                (click)="closeMenu()"
              >
                {{ subitem.label }}
              </a>
            </div>
          </li>
        </ul>
      </nav>

      <div class="actions">
        <div class="nav-item profile-menu">
        <button
          class="user-icon-btn"
          aria-label="User profile menu"
          [attr.aria-expanded]="isDropdownOpen('profile-menu')"
          title="Open user menu"
          (click)="toggleDropdown('profile-menu')"
        >
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </button>
          <div class="dropdown-menu" [class.active]="isDropdownOpen('profile-menu')" role="menu">
            <button class="dropdown-item profile-disconnect" type="button" role="menuitem" (click)="logout()" [disabled]="isLoggingOut()">
              {{ isLoggingOut() ? 'Disconnecting...' : 'Disconnect' }}
            </button>
          </div>
        </div>
      </div>

      <button
        class="mobile-menu-btn"
        aria-label="Toggle mobile menu"
        [attr.aria-expanded]="currentMenuState.mainMenuOpen"
        (click)="toggleMainMenu()"
      >
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>

    <nav
      class="nav-mobile"
      [class.active]="currentMenuState.mainMenuOpen"
      role="navigation"
      aria-label="Mobile navigation"
    >
      <ul class="mobile-nav-list">
        <li *ngFor="let item of navigationItems" class="mobile-nav-item">
          <a
            [routerLink]="hasSubmenu(item) ? null : item.href"
            class="mobile-nav-link"
            (click)="hasSubmenu(item) ? toggleDropdown(item.label) : closeMenu(); hasSubmenu(item) && $event.preventDefault()"
          >
            {{ item.label }}
          </a>

          <div
            *ngIf="hasSubmenu(item)"
            class="mobile-submenu"
            [class.active]="isDropdownOpen(item.label)"
          >
            <a
              *ngFor="let subitem of item.submenu"
              [routerLink]="subitem.href"
              class="mobile-submenu-item"
              (click)="closeMenu()"
            >
              {{ subitem.label }}
            </a>
          </div>
        </li>
        <li class="mobile-nav-item">
          <button class="mobile-nav-link mobile-disconnect" type="button" (click)="logout()" [disabled]="isLoggingOut()">
            {{ isLoggingOut() ? 'Disconnecting...' : 'Disconnect' }}
          </button>
        </li>
      </ul>
    </nav>
  </header>

  <main class="site-main">
    <router-outlet />
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <div class="footer-brand">
        <div class="footer-title">VENDEO</div>
        <div class="footer-text">Rabearison Nantenaina Angelo</div>
        <div class="footer-text">Ranaivo Rasoanarivelo Fy Anjatia</div>
        <div class="footer-socials">
          <a class="social" href="#" aria-label="Instagram">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 3h10a4 4 0 0 1 4 4v10a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V7a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H7zm5 3.5a4.5 4.5 0 1 1 0 9 4.5 4.5 0 0 1 0-9zm0 2a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zm5.25-2.75a1 1 0 1 1 0 2 1 1 0 0 1 0-2z" />
            </svg>
          </a>
          <a class="social" href="#" aria-label="LinkedIn">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6.5 9.5V18H4V9.5h2.5zM5.25 6.75a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5zM20 13.1V18h-2.5v-4.1c0-1-.4-1.7-1.4-1.7-.8 0-1.3.5-1.5 1-.1.2-.1.5-.1.8V18H12V9.5h2.4v1.2h.1c.3-.6 1.1-1.4 2.5-1.4 1.7 0 3 1.1 3 3.8z" />
            </svg>
          </a>
          <a class="social" href="#" aria-label="X">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 4h4.6l3.3 4.7L15.7 4H20l-5.7 7.2L20 20h-4.6l-3.6-5.2L8.1 20H4l6-7.7L4 4z" />
            </svg>
          </a>
        </div>
      </div>
      <div class="footer-col">
        <div class="footer-heading">Features</div>
        <a class="footer-link" href="#">Core features</a>
        <a class="footer-link" href="#">Pro experience</a>
        <a class="footer-link" href="#">Integrations</a>
      </div>
      <div class="footer-col">
        <div class="footer-heading">Learn more</div>
        <a class="footer-link" href="#">Blog</a>
        <a class="footer-link" href="#">Case studies</a>
        <a class="footer-link" href="#">Customer stories</a>
      </div>
      <div class="footer-col">
        <div class="footer-heading">Support</div>
        <a class="footer-link" href="#">Contact</a>
        <a class="footer-link" href="#">Support</a>
        <a class="footer-link" href="#">Legal</a>
      </div>
    </div>
  </footer>
</div>

<ng-template #authOnly>
  <router-outlet />
</ng-template>
