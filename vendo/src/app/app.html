<div *ngIf="showLayout(); else authOnly" class="page">
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">VENDEO</div>

        <a class="nav-link" routerLink="/admin/dashboard">Dashboard</a>

      <div class="footer-col">
        <div class="footer-heading">Learn more</div>
        <a class="footer-link" href="#">Blog</a>
        <a class="footer-link" href="#">Case studies</a>
        <a class="footer-link" href="#">Customer stories</a>

      <div class="footer-col">

        <a class="footer-link" href="#">Contact</a>
        <a class="footer-link" href="#">Support</a>
