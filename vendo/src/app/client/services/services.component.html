<section class="services-page">
  <div class="backdrop-shape shape-a"></div>
  <div class="backdrop-shape shape-b"></div>

  <header class="services-header">
    <p class="eyebrow">Services client</p>
    <h1>Des services premium pour votre experience d'achat</h1>
    <p class="subtitle">
      Vendeo accompagne vos achats avec des options pratiques, du paiement jusqu'a la livraison.
    </p>

    <section class="trust-strip" aria-label="Indicateurs de confiance">
      <article class="trust-card" *ngFor="let point of trustPoints">
        <strong>{{ point.value }}</strong>
        <span>{{ point.label }}</span>
      </article>
    </section>
  </header>

  <section class="services-grid">
    <article class="service-card" *ngFor="let item of services">
      <header class="service-top">
        <span class="service-icon" aria-hidden="true">{{ getServiceInitial(item.title) }}</span>
        <span class="service-badge">{{ item.badge }}</span>
      </header>
      <h2>{{ item.title }}</h2>
      <p>{{ item.description }}</p>
      <button type="button">
        {{ item.cta }}
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3">
          <line x1="5" y1="12" x2="19" y2="12" />
          <polyline points="12 5 19 12 12 19" />
        </svg>
      </button>
    </article>
  </section>
</section>
