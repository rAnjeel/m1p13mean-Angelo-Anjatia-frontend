<nav class="nav" id="navbar">
  <div class="nav-logo">Vend<span>e</span>o</div>
  <ul class="nav-links">
    <li><a routerLink="/client/shops">Boutiques</a></li>
    <li><a routerLink="/client/products">Produits</a></li>
    <li><a routerLink="/client/home" fragment="nouveautes">Nouveautes</a></li>
    <li><a routerLink="/client/services">Services</a></li>
  </ul>

  <div class="nav-actions">
    <ng-container *ngIf="mode === 'home'; else standardActions">
      <div class="nav-icon-btn" title="Rechercher">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
      </div>
      <div class="nav-icon-btn" title="Favoris">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path
            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
        </svg>
      </div>
      <a class="nav-icon-btn" title="Panier" routerLink="/client/carts">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
          <line x1="3" y1="6" x2="21" y2="6" />
          <path d="M16 10a4 4 0 0 1-8 0" />
        </svg>
        <span class="cart-count">{{ cartCount }}</span>
      </a>
      <a class="nav-icon-btn" title="Profil" routerLink="/client/profile">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 21a8 8 0 0 1 16 0"></path>
        </svg>
      </a>
    </ng-container>

    <ng-template #standardActions>
      <a class="nav-icon-btn" title="Accueil" routerLink="/client/home">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 10.5 12 3l9 7.5"></path>
          <path d="M5 9.5V21h14V9.5"></path>
        </svg>
      </a>
      <a class="nav-icon-btn" title="Panier" routerLink="/client/carts">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
          <line x1="3" y1="6" x2="21" y2="6" />
          <path d="M16 10a4 4 0 0 1-8 0" />
        </svg>
        <span class="cart-count">{{ cartCount }}</span>
      </a>
      <a class="nav-icon-btn" title="Profil" routerLink="/client/profile">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 21a8 8 0 0 1 16 0"></path>
        </svg>
      </a>
      <button type="button" class="nav-icon-btn" title="Menu" (click)="toggleMenu()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="4" y1="7" x2="20" y2="7"></line>
          <line x1="4" y1="12" x2="20" y2="12"></line>
          <line x1="4" y1="17" x2="20" y2="17"></line>
        </svg>
      </button>
      <div class="nav-menu" *ngIf="isMenuOpen">
        <button type="button" class="nav-menu-item" (click)="logout()">Se deconnecter</button>
      </div>
    </ng-template>
  </div>
</nav>
