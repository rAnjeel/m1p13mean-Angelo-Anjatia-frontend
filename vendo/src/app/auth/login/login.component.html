<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-visual" aria-hidden="true">
      <span class="blob blob-one"></span>
      <span class="blob blob-two"></span>
      <span class="blob blob-three"></span>
    </div>

    <div class="auth-form">
      <div class="auth-card-header">
        <h1>Bon retour sur Vendeo</h1>
        <p>Connectez-vous pour continuer.</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="form-field">
          <label for="email">Adresse e-mail</label>
          <input id="email" type="email" formControlName="email" placeholder="Entrez votre e-mail" />
          <div class="field-error" *ngIf="hasError('email')">
            <span *ngIf="hasError('email', 'required')">L'e-mail est obligatoire.</span>
            <span *ngIf="hasError('email', 'email')">Veuillez saisir une adresse e-mail valide.</span>
          </div>
        </div>

        <div class="form-field">
          <label for="password">Mot de passe</label>
          <input id="password" type="password" formControlName="password" placeholder="Entrez votre mot de passe" />
          <div class="field-error" *ngIf="hasError('password')">
            <span *ngIf="hasError('password', 'required')">Le mot de passe est obligatoire.</span>
            <span *ngIf="hasError('password', 'minlength')">Le mot de passe doit contenir au moins 8 caractères.</span>
          </div>
        </div>

        <button class="primary-button" type="submit" [disabled]="loading()">
          <span *ngIf="!loading()">Se connecter</span>
          <span *ngIf="loading()">Connexion en cours...</span>
        </button>

        <div class="link-row">
          <span>Vous n'avez pas de compte ?</span>
          <a class="link" routerLink="/register">Créer un compte</a>
        </div>

        <div class="space-row">
          <button type="button" class="space-btn" (click)="fillClientCredentials()">
            Espace Client
          </button>
          <button type="button" class="space-btn" (click)="fillShopkeeperCredentials()">
            Espace Boutiquier
          </button>
          <button type="button" class="space-btn" (click)="fillAdminCredentials()">
            Espace Admin
          </button>
        </div>

        <div class="server-messages" *ngIf="serverErrors().length || successMessage()">
          <div class="server-error" *ngIf="serverErrors().length">
            <p *ngFor="let error of serverErrors()">{{ error }}</p>
          </div>
          <div class="server-success" *ngIf="successMessage()">
            <p>{{ successMessage() }}</p>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
