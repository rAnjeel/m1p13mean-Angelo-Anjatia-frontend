<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-visual" aria-hidden="true">
      <span class="blob blob-one"></span>
      <span class="blob blob-two"></span>
      <span class="blob blob-three"></span>
    </div>

    <div class="auth-form">
      <div class="auth-card-header">
        <h1>Welcome back</h1>
        <p>Log in to continue.</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="form-field">
          <label for="email">Email address</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="Enter your email"
          />
          <div class="field-error" *ngIf="hasError('email')">
            <span *ngIf="hasError('email', 'required')">Email is required.</span>
            <span *ngIf="hasError('email', 'email')">Please enter a valid email address.</span>
          </div>
        </div>

        <div class="form-field">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="Enter your password"
          />
          <div class="field-error" *ngIf="hasError('password')">
            <span *ngIf="hasError('password', 'required')">Password is required.</span>
            <span *ngIf="hasError('password', 'minlength')">
              Password must be at least 8 characters.
            </span>
          </div>
        </div>

        <button
          class="primary-button"
          type="submit"
          [disabled]="loading()"
        >
          <span *ngIf="!loading()">Log in</span>
          <span *ngIf="loading()">Logging in...</span>
        </button>

        <div class="server-messages" *ngIf="serverErrors().length || successMessage()">
          <div class="server-error" *ngIf="serverErrors().length">
            <p *ngFor="let error of serverErrors()">{{ error }}</p>
          </div>
          <div class="server-success" *ngIf="successMessage()">
            <p>{{ successMessage() }}</p>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
